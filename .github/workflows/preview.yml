name: Preview Deployment Check

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  comment:
    name: Post Preview URL
    runs-on: ubuntu-latest
    steps:
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.body.includes('Preview deployment'));
            const body = `## Preview deployment\nVercel will automatically deploy this PR and post the preview URL below.\n\n**Checklist before merging:**\n- [ ] Runs without console errors\n- [ ] Works on mobile (375px)\n- [ ] Keyboard navigation works\n- [ ] Loading and error states visible`;
            if (!botComment) {
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
