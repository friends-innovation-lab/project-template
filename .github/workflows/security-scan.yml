# lab-templates/workflows/security-scan.yml
# Implements: ENTERPRISE-READINESS.md → "Code and operational hygiene"
# Runs: gitleaks (secret scan), npm audit (dep scan), license-checker (license check)

name: Security Scan

on:
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan on Mondays at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks
        run: gitleaks detect --config .gitleaks.toml --verbose --redact
        # Uses open-source gitleaks CLI instead of paid gitleaks-action
        # The CLI provides full functionality without requiring a license

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=critical
        # High-severity vulnerabilities are documented and tracked in
        # docs/runbooks/known-vulnerabilities.md. Critical issues block CI immediately.
        # This threshold aligns with ENTERPRISE-READINESS.md vendor management guidance.

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install license-checker
        run: npm install -g license-checker

      - name: Check licenses
        run: |
          license-checker --failOn "GPL;AGPL;LGPL" --summary
        # Fails if any dependency uses GPL, AGPL, or LGPL licenses
        # Adjust --failOn list per project requirements
