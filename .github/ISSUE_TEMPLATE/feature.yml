name: Feature Request
description: Propose a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please fill out the form below.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve?
      placeholder: I'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work?
      placeholder: Describe your ideal solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
      placeholder: I also thought about...

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this feature is complete?
      placeholder: |
        - [ ] User can...
        - [ ] System should...
    validations:
      required: true

  - type: checkboxes
    id: standards
    attributes:
      label: Standards impact
      description: Which lab standards might this feature affect?
      options:
        - label: ENTERPRISE-READINESS (security, compliance)
        - label: PERFORMANCE (load times, resource usage)
        - label: DATA-GOVERNANCE (data handling, PII)
        - label: ACCESSIBILITY (WCAG compliance)
        - label: None of the above

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, examples, or other context
